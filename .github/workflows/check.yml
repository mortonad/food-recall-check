# 中鏢查詢器 每日看門狗
# 放置路徑（新 repo 內）：.github/workflows/check.yml
name: 回收名單每日看門狗

on:
  schedule:
    - cron: "37 22 * * *"   # UTC 22:37 = 台北 06:37（避開整點尖峰，排程更準時）
  workflow_dispatch: {}      # 可手動執行測試

permissions:
  contents: write
  issues: write          # 讓看門狗能開 Issue 通知你（GitHub 會自動寄信）

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: 取出 repo
        uses: actions/checkout@v5

      - name: 檔案齊全檢查（缺什麼直接告訴你）
        run: |
          missing=0
          for f in update_recall.py data/recall_list.json app.js; do
            if [ ! -f "$f" ]; then echo "❌ repo 缺檔案：$f ——請照部署教學 Phase 1 用 Add file 上傳"; missing=1; fi
          done
          if [ "$missing" -eq 0 ]; then echo "✅ 檔案齊全"; fi
          exit $missing

      - name: 驗證名單＋偵測官方新公告
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 update_recall.py

      - name: 提交狀態檔（alert / seen）
        id: commit
        run: |
          git config user.name "recall-watchdog"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "無變化，不需提交"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "watchdog: $(date -u +%F)"
            git pull --rebase origin main   # 先拉再推：避免與你手動 commit 撞車
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 清除 jsDelivr CDN 快取（有更新才清；讓網頁即時反映新名單，且不再打 raw 被限流 429）
        if: steps.commit.outputs.pushed == 'true'
        run: |
          for p in data/recall_list.json app.js; do
            echo "🧹 purge $p"
            curl -sS --max-time 30 "https://purge.jsdelivr.net/gh/mortonad/food-recall-check@main/$p" \
              || echo "⚠️ purge $p 失敗（非致命；jsDelivr 最多約 12 小時內會自行更新）"
          done
