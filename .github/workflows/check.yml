# 中鏢查詢器 每日看門狗
# 放置路徑（新 repo 內）：.github/workflows/check.yml
name: 回收名單每日看門狗

on:
  schedule:
    - cron: "37 22 * * *"   # UTC 22:37 = 台北 06:37，避開整點排隊
  workflow_dispatch: {}      # 可手動執行測試

permissions:
  contents: write

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: 取出 repo
        uses: actions/checkout@v5

      - name: 檔案齊全檢查（缺什麼直接告訴你）
        run: |
          missing=0
          for f in update_recall.py data/recall_list.json app.js; do
            if [ ! -f "$f" ]; then echo "❌ repo 缺檔案：$f ——請照部署教學 Phase 1 用 Add file 上傳"; missing=1; fi
          done
          if [ "$missing" -eq 0 ]; then echo "✅ 檔案齊全"; fi
          exit $missing

      - name: 驗證名單＋偵測官方新公告
        run: python3 update_recall.py

      - name: 提交狀態檔（alert / seen）
        run: |
          git config user.name "recall-watchdog"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "無變化" || git commit -m "watchdog: $(date -u +%F)"
          git push
